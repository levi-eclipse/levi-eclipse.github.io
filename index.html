<!DOCTYPE html>
<html>
<body>
<pre id="out">Running...</pre>
<script>
fetch('https://1win.com/api/v1/product-visits', {
  method: 'POST',
  mode: 'no-cors',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    partnerHash: 'BOUNTY_TRIAGE_TEST',
    landingId: 'casino'
  })
})
.then(() => {
  document.getElementById('out').textContent =
    'Request sent — check 1win.com cookies in DevTools > Application > Cookies';
})
.catch(e => {
  document.getElementById('out').textContent = 'BLOCKED: ' + e;
});
</script>
</body>
</html>
